<!-- DeepSeek对话逻辑 -->
<script>
// ========== 请替换为你的DeepSeek Key ==========
const DEEPSEEK_API_KEY = "sk-d2eb0cf33fe6485f8c73ba878cce99cd";
// ==============================================
const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
const MODEL_NAME = "deepseek-chat";

const btn = document.getElementById("ai-chat-button");
const win = document.getElementById("ai-chat-window");
const closeBtn = document.getElementById("ai-chat-close");
const content = document.getElementById("ai-chat-content");
const input = document.getElementById("ai-input");
const sendBtn = document.getElementById("ai-send");

// 打开/关闭弹窗
btn.addEventListener("click", () => {
  win.style.display = win.style.display === "none" ? "flex" : "none";
});
closeBtn.addEventListener("click", () => {
  win.style.display = "none";
});

// 发送消息
async function sendMessage() {
  const question = input.value.trim();
  if (!question) return;

  // 移除欢迎语
  const welcome = content.querySelector(".ai-welcome");
  if (welcome) welcome.remove();

  // 显示用户消息
  content.innerHTML += `<div class="ai-user"><span>${question}</span></div>`;
  input.value = "";

  // 调用DeepSeek
  try {
    const res = await fetch(DEEPSEEK_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL_NAME,
        messages: [{ role: "user", content: question }],
        temperature: 0.7
      })
    });

    const data = await res.json();
    const answer = data.choices?.[0]?.message?.content || "抱歉，暂无回复。";
    content.innerHTML += `<div class="ai-bot"><span>${answer}</span></div>`;
  } catch (e) {
    content.innerHTML += `<div class="ai-bot"><span>请求失败，请稍后重试。</span></div>`;
    console.error(e);
  }
  content.scrollTop = content.scrollHeight;
}

sendBtn.addEventListener("click", sendMessage);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>
