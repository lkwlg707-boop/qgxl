<script>
// ========================
// DeepSeek 配置
// ========================
const DEEPSEEK_API_KEY = "sk-xxxxxxxxxxxxxxxx";
const DEEPSEEK_API_URL = "https://api.deepseek.com/chat/completions";
const MODEL_NAME = "deepseek-chat";

// ========================
// 获取元素
// ========================
const btn = document.getElementById("ai-chat-button");
const win = document.getElementById("ai-chat-window");
const closeBtn = document.getElementById("ai-chat-close");
const content = document.getElementById("ai-chat-content");
const input = document.getElementById("ai-input");
const sendBtn = document.getElementById("ai-send");

// ========================
// 对话上下文
// ========================
const messages = [
  {
    role: "system",
    content: "你是一个专业、友好的网站智能客服助手。"
  }
];

// ========================
// 打开/关闭弹窗
// ========================
btn.addEventListener("click", () => {
  const isHidden = getComputedStyle(win).display === "none";
  win.style.display = isHidden ? "flex" : "none";
});

closeBtn.addEventListener("click", () => {
  win.style.display = "none";
});

// ========================
// 创建消息DOM
// ========================
function appendMessage(type, text) {
  const div = document.createElement("div");
  div.className = type;

  const span = document.createElement("span");
  span.textContent = text;

  div.appendChild(span);
  content.appendChild(div);

  content.scrollTop = content.scrollHeight;

  return div;
}

// ========================
// 发送消息
// ========================
async function sendMessage() {
  const question = input.value.trim();

  if (!question) return;

  // 删除欢迎语
  const welcome = content.querySelector(".ai-welcome");
  if (welcome) {
    welcome.remove();
  }

  // 用户消息
  appendMessage("ai-user", question);

  // 加入上下文
  messages.push({
    role: "user",
    content: question
  });

  // 清空输入框
  input.value = "";

  // loading
  const loadingDiv = appendMessage("ai-bot", "正在思考中...");

  try {
    const response = await fetch(DEEPSEEK_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
      },
      body: JSON.stringify({
        model: MODEL_NAME,
        messages: messages,
        temperature: 0.7,
        stream: false
      })
    });

    // HTTP错误
    if (!response.ok) {
      throw new Error(`HTTP错误: ${response.status}`);
    }

    const data = await response.json();

    console.log("DeepSeek返回：", data);

    const answer =
      data.choices?.[0]?.message?.content ||
      "抱歉，我暂时无法回答。";

    // 替换loading内容
    loadingDiv.querySelector("span").textContent = answer;

    // 加入上下文记忆
    messages.push({
      role: "assistant",
      content: answer
    });

  } catch (error) {

    console.error("请求失败：", error);

    loadingDiv.querySelector("span").textContent =
      "请求失败，请稍后重试。";
  }

  // 滚动到底部
  content.scrollTop = content.scrollHeight;
}

// ========================
// 点击发送
// ========================
sendBtn.addEventListener("click", sendMessage);

// ========================
// 回车发送
// ========================
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>
